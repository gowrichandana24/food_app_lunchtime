name: food_app
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  lottie: ^2.7.0
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  fl_chart: ^0.68.0
  image_picker: ^1.2.1
  http: ^1.6.0
  razorpay_flutter: ^1.3.0
  qr_flutter: ^4.1.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^6.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/cafes/
    - assets/
fonts:
  - family: Nunito
    fonts:
      - asset: assets/fonts/Nunito-Regular.ttf
      - asset: assets/fonts/Nunito-Bold.ttf
        weight: 700

  - family: Inter
    fonts:
      - asset: assets/fonts/Inter-Regular.ttf
